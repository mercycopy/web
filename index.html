<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mercy | profile</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: #030303; color: #ffffff; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 40px 20px; overflow: hidden; position: relative; }
        
        body::before { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 600px; height: 600px; background: radial-gradient(circle, rgba(255,255,255,0.02) 0%, rgba(0,0,0,0) 70%); z-index: 1; pointer-events: none; }
        
        #bg-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
        
        .container { text-align: center; max-width: 580px; width: 100%; position: relative; z-index: 3; animation: containerAppear 1s ease-out forwards; }
        
        .avatar-container { position: relative; width: 110px; height: 110px; margin: 0 auto 24px auto; }
        .avatar { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 0 30px rgba(0,0,0,0.7); }
        .dnd-status { position: absolute; bottom: 4px; right: 4px; width: 24px; height: 24px; background-color: #f23f43; border-radius: 50%; border: 4px solid #050505; display: flex; justify-content: center; align-items: center; }
        .dnd-status::after { content: ''; width: 10px; height: 2px; background-color: #050505; border-radius: 1px; }
        
        h1 { font-size: 2.1rem; font-weight: 500; letter-spacing: 2px; margin-bottom: 6px; text-transform: lowercase; }
        .tg-tag { display: inline-block; font-size: 0.85rem; color: #444444; text-decoration: none; letter-spacing: 0.5px; margin-bottom: 36px; transition: color 0.2s; }
        .tg-tag:hover { color: #888888; }
        
        .statement-box { background: rgba(9, 9, 9, 0.65); border: 1px solid rgba(255, 255, 255, 0.04); border-radius: 12px; padding: 36px; text-align: left; backdrop-filter: blur(30px); box-shadow: 0 30px 70px rgba(0, 0, 0, 0.9), inset 0 1px 0 rgba(255,255,255,0.02); }
        .box-header { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 3px; color: #333333; margin-bottom: 24px; border-bottom: 1px solid rgba(255, 255, 255, 0.03); padding-bottom: 12px; display: flex; justify-content: space-between; }
        
        .statement-box p { font-size: 0.95rem; line-height: 1.75; color: #888888; margin-bottom: 32px; }
        
        .player-box { background: rgba(255, 255, 255, 0.015); border: 1px solid rgba(255, 255, 255, 0.02); border-radius: 8px; padding: 18px; display: flex; align-items: center; gap: 20px; }
        .player-cover { width: 64px; height: 64px; border-radius: 6px; object-fit: cover; }
        .player-main { flex-grow: 1; display: flex; flex-direction: column; gap: 12px; }
        .player-info { display: flex; justify-content: space-between; align-items: baseline; }
        .track-title { font-size: 0.9rem; color: #ffffff; font-weight: 500; }
        .track-artist { font-size: 0.65rem; color: #444444; text-transform: uppercase; letter-spacing: 1px; }
        
        .progress-container { width: 100%; height: 2px; background: rgba(255, 255, 255, 0.04); overflow: hidden; position: relative; }
        .progress-bar { height: 100%; background: rgba(255, 255, 255, 0.4); width: 100%; transform: translateX(-100%); animation: playTrack 45s linear infinite; }
        
        .player-meta { display: flex; justify-content: space-between; font-size: 0.7rem; color: #333333; font-family: monospace; }
        
        @keyframes playTrack {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(0%); }
        }
        
        @keyframes containerAppear { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    <div class="container">
        <div class="avatar-container">
            <!-- Установлен аватар.гиф -->
            <img src="avatar.gif" alt="mercy" class="avatar">
            <div class="dnd-status"></div>
        </div>
        <h1>mercy</h1>
        <a href="https://t.me/copymercy" class="tg-tag">@copymercy</a>
        
        <div class="statement-box">
            <div class="box-header"><span>OVERVIEW</span><span>HUB</span></div>
            
            <p>Личное пространство без лишнего контекста. Текст, медиа и файлы сохраняются здесь исключительно в архивных целях. Внешний шум не имеет значения.</p>
            
            <div class="player-box">
                <img src="image_3734e2.gif" alt="cover" class="player-cover">
                <div class="player-main">
                    <div class="player-info">
                        <span class="track-title">blood stains</span>
                        <span class="track-artist">plattmade</span>
                    </div>
                    <div class="progress-container"><div class="progress-bar"></div></div>
                    <div class="player-meta">
                        <span>0:45 / 2:38</span>
                        <span>FLAC 24-BIT</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        
        class Particle {
            constructor() { 
                this.x = Math.random() * canvas.width; 
                this.y = Math.random() * canvas.height; 
                this.size = Math.random() * 2.2 + 0.6; 
                this.speedY = -(Math.random() * 0.12 + 0.03); 
                this.opacity = Math.random() * 0.5; 
                this.dir = Math.random() > 0.5 ? 1 : -1; 
            }
            update() { 
                this.y += this.speedY; 
                this.opacity += (Math.random() * 0.002) * this.dir; 
                if(this.opacity >= 0.5 || this.opacity <= 0.02) this.dir *= -1; 
                if(this.y < 0) this.y = canvas.height; 
            }
            draw() { 
                ctx.beginPath(); 
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); 
                ctx.fillStyle = `rgba(255,255,255,${this.opacity})`; 
                ctx.fill(); 
            }
        }
        
        for(let i=0; i<45; i++) particles.push(new Particle());
        function animate() { ctx.clearRect(0,0,canvas.width,canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
        animate();
    </script>
</body>
</html>
